<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>📦 Gestión de Inventario</h1>
        <button id="theme-toggle" class="btn-theme">🌙</button>
    </header>
    
    <form id="productoForm">
        <input type="hidden" id="productoId">
        <div class="form-grid">
            <input type="text" id="nombre" placeholder="Nombre del Producto" required>
            <input type="number" id="precio" placeholder="Precio ($)" step="0.01" required>
            <input type="number" id="stock" placeholder="Stock" required>
            <input type="text" id="categoria" placeholder="Categoría" required>
        </div>
        <button type="submit" id="btnSubmit" class="btn-save">Registrar Producto</button>
    </form>

    <div class="table-container">
        <table id="tablaProductos">
            <thead>
                <tr>
                    <th># ID</th>
                    <th>Nombre</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Categoría</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
