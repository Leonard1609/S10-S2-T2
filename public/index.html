<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Gestión de Productos</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #dc2626;
            --dark: #1e293b;
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        h1 { color: var(--dark); text-align: center; margin-bottom: 30px; }

        /* Formulario Estilizado */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        .btn-container { text-align: center; }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save { background-color: var(--primary); color: white; width: 100%; }
        .btn-save:hover { background-color: #1d4ed8; }

        /* Tabla Profesional */
        table { width: 100%; border-collapse: collapse; margin-top: 30px; overflow: hidden; border-radius: 8px; }
        
        th { background-color: var(--dark); color: white; padding: 15px; text-align: left; }
        
        td { padding: 15px; border-bottom: 1px solid #e2e8f0; color: #475569; }

        tr:hover { background-color: #f1f5f9; }

        .actions { display: flex; gap: 8px; }

        .btn-edit { background-color: #f59e0b; color: white; padding: 6px 12px; font-size: 12px; }
        .btn-delete { background-color: var(--danger); color: white; padding: 6px 12px; font-size: 12px; }
        
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Gestión de Inventario</h1>
    
    <form id="productoForm">
        <input type="hidden" id="productoId"> <div class="form-grid">
            <input type="text" id="nombre" placeholder="Nombre del Producto" required>
            <input type="number" id="precio" placeholder="Precio ($)" step="0.01" min="0.01" required>
            <input type="number" id="stock" placeholder="Stock Inicial" min="0" required>
            <input type="text" id="categoria" placeholder="Categoría" required>
        </div>
        <div class="btn-container">
            <button type="submit" id="btnSubmit" class="btn-save">Registrar Producto</button>
        </div>
    </form>

    <table id="tablaProductos">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const form = document.getElementById('productoForm');
    const tabla = document.querySelector('#tablaProductos tbody');
    const btnSubmit = document.getElementById('btnSubmit');
    const inputId = document.getElementById('productoId');

    // Listar Productos
    async function cargarProductos() {
        const res = await fetch('/productos');
        const productos = await res.json();
        tabla.innerHTML = '';
        productos.forEach(p => {
            tabla.innerHTML += `
                <tr>
                    <td><strong>${p.nombre}</strong></td>
                    <td>$${p.precio.toFixed(2)}</td>
                    <td>${p.stock} unidades</td>
                    <td>${p.categoria}</td>
                    <td class="actions">
                        <button class="btn-edit" onclick="prepararEdicion(${p.id}, '${p.nombre}', ${p.precio}, ${p.stock}, '${p.categoria}')">Editar</button>
                        <button class="btn-delete" onclick="eliminar(${p.id})">Eliminar</button>
                    </td>
                </tr>`;
        });
    }

    // Registrar o Editar
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const id = inputId.value;
        const data = {
            nombre: document.getElementById('nombre').value,
            precio: parseFloat(document.getElementById('precio').value),
            stock: parseInt(document.getElementById('stock').value),
            categoria: document.getElementById('categoria').value
        };

        // Validaciones extra de seguridad
        if (data.precio <= 0 || data.stock < 0) {
            alert("El precio debe ser mayor a 0 y el stock no puede ser negativo.");
            return;
        }

        const url = id ? `/productos/${id}` : '/productos';
        const method = id ? 'PUT' : 'POST';

        await fetch(url, {
            method: method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        resetForm();
        cargarProductos();
    });

    function prepararEdicion(id, nombre, precio, stock, categoria) {
        inputId.value = id;
        document.getElementById('nombre').value = nombre;
        document.getElementById('precio').value = precio;
        document.getElementById('stock').value = stock;
        document.getElementById('categoria').value = categoria;
        
        btnSubmit.textContent = "Actualizar Producto";
        btnSubmit.style.backgroundColor = "#f59e0b";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        form.reset();
        inputId.value = '';
        btnSubmit.textContent = "Registrar Producto";
        btnSubmit.style.backgroundColor = "#2563eb";
    }

    async function eliminar(id) {
        if(confirm('¿Deseas eliminar este producto del inventario?')) {
            await fetch(`/productos/${id}`, { method: 'DELETE' });
            cargarProductos();
        }
    }

    cargarProductos();
</script>

</body>
</html>
