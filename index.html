<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Productos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <div style="font-size: 3rem;">📦</div>
            <h1>Sistema de Inventario</h1>
            <p>Gestiona tus productos de manera fácil y rápida</p>
        </header>

        <div class="card">
            <div class="card-title title-green">
                <i class="fa-regular fa-square-plus"></i> Nuevo Producto
            </div>
            <form id="productForm" class="product-form">
                <div class="input-group">
                    <label for="nombre">Nombre del producto</label>
                    <input type="text" id="nombre" placeholder="Ej: Laptop Lenovo" required>
                </div>
                <div class="input-group">
                    <label for="precio">Precio (S/.)</label>
                    <input type="number" id="precio" placeholder="Ej: 2500" step="0.01" required>
                </div>
                <div class="input-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" placeholder="Ej: 10" required>
                </div>
                <button type="submit" class="btn btn-save">
                    <i class="fa-regular fa-floppy-disk"></i> Guardar Producto
                </button>
            </form>
        </div>

        <div class="card" style="padding: 0;">
            <div class="card-title title-blue" style="padding: 20px 20px 0 20px;">
                <i class="fa-solid fa-list-check"></i> Lista de Productos
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio (S/.)</th>
                        <th>Stock</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    </tbody>
            </table>
        </div>

        <footer>
            © 2024 Sistema de Inventario - CRUD con Node.js, Express y SQLite
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
